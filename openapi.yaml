  /api/v1/{owner_name}/{repo_name}:
    get:
      summary: リポジトリ詳細を取得する
      tags:
        - Github Repository APIs
      parameters:
        - in: path
          name: owner_name
          required: true
          schema:
            type: string
          description: リポジトリ管理者
          example: facebook
        - in: path
          name: repo_name
          required: true
          schema:
            type: string
          description: リポジトリ名
          example: react
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url:
                    type: string
                    description: ユーザーのアバターURL
                  language:
                    type: string
                    description: 使用している言語一覧
                  repository_info:
                    type: object
                    description: リポジトリ情報
                    properties:
                      star_count:
                        type: integer
                      watcher_count:
                        type: integer
                      fork_count:
                        type: integer
                      issues_count:
                        type: integer
                    required:
                      - star_count
                      - watcher_count
                      - fork_count
                      - issues_count
                required:
                  - avatar_url
                  - language
                  - repository_info
              example:
                avatar_url: 'https://avatars.githubusercontent.com/u/69631?v=4'
                language: 'TypeScript'
                repository_info:
                  star_count: 53157
                  watcher_count: 53157
                  fork_count: 9064
                  issues_count: 1002
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: 'owner_name または repo_name が不正です'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_message:
                    type: string
              example:
                error_message: 'An unexpected error occurred'
