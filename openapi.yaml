openapi: 3.0.0
info:
  title: GitHub Profile Checker API
  version: 1.0.0
  description: GitHub Profile CheckerのAPI仕様書です。
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://vercel-todo.com
    description: Production server
paths:
  /api/search:
    get:
      summary: GitHubリポジトリを検索する
      tags:
        - Github Repository APIs
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: 検索クエリ
          example: some_keyword_here
        - in: query
          name: page
          schema:
            type: integer
          description: ページ目
          example: 5
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_pages:
                    type: integer
                    description: ページ数（1ページは最大30項目）
                  total_count:
                    type: integer
                    description: 結果件数
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        avatar_url:
                          type: string
                          description: ユーザーのアバターURL
                        repository_name:
                          type: string
                          description: リポジトリ名
                        user_name:
                          type: string
                          description: ユーザー名
                    description: 検索結果の配列
                required:
                  - total_pages
                  - total_count
                  - result
              example:
                total_pages: 2
                total_count: 42
                result:
